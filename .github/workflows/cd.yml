name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python main.py

      - name: Check model file
        run: test -f models/best_model.pkl

      - name: Commit trained model to models/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f models/best_model.pkl
          if git diff --staged --quiet; then
            echo "Model unchanged; nothing to commit."
          else
            git commit -m "ci: update trained model [skip ci]"
            git push
          fi

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/best_model.pkl
